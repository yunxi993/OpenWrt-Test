name: x86-build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  DIY_P1_SH: configs/official/diy-z1.sh
  DIY_P2_SH: configs/official/diy-x86.sh
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build x86 (${{ matrix.name }})
    runs-on: ubuntu-latest
    outputs:
      rel_date: ${{ steps.clone.outputs.rel_date }}
      tag_date: ${{ steps.clone.outputs.tag_date }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main
            branch: main
            feeds: configs/official/feeds.main
            config: configs/official/x86-main.config
          - name: 2512
            branch: openwrt-25.12
            feeds: configs/official/feeds.2512
            config: configs/official/x86-2512.config

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -euo pipefail
        docker image prune -f
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/yunxi993/OpenWrt-Test/main/depends)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo -E timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        df -hT

    - name: Fast Free Space
      run: |
        set -euo pipefail
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift /usr/share/sbt /usr/src/linux-headers*
        sudo docker image prune -a -f
        df -hT

    - name: Clone source code
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        git clone --depth 1 --single-branch $REPO_URL -b ${{ matrix.branch }} openwrt
        ln -sf ${{ github.workspace }}/openwrt $GITHUB_WORKSPACE/openwrt

        echo "=============================================="
        echo "Current Release Date: $(date +"%Y-%m-%d %H:%M:%S")"
        echo "Current Tag Date:     $(date +"%m%d-%H%M%S")"
        echo "=============================================="

    - name: Cache Management
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: true
        mixkey: x86-${{ matrix.name }}
        prefix: ${{ github.workspace }}/openwrt

    - name: Load and Update feeds
      run: |
        set -euo pipefail
        [ -e ${{ matrix.feeds }} ] && mv ${{ matrix.feeds }} openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        echo "::group::Print update and install Feeds..."
        ./scripts/feeds update -a && ./scripts/feeds install -a
        echo "::endgroup::"

        echo "=============================================="
        echo "Current Release Date: $(date +"%Y-%m-%d %H:%M:%S")"
        echo "Current Tag Date:     $(date +"%m%d-%H%M%S")"
        echo "=============================================="

    - name: Load custom configuration
      run: |
        set -euo pipefail
        [ -e files ] && mv files openwrt/files
        [ -e ${{ matrix.config }} ] && mv ${{ matrix.config }} openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: clone
      run: |
        set -euo pipefail
        cd openwrt
        echo "::group::Print package download info..."
        make defconfig
        make download -j$(nproc)
        echo "::endgroup::"
        find dl -size -1024c -exec rm -f {} \;
        echo "rel_date=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT
        echo "tag_date=$(date +"%m%d-%H%M%S")" >> $GITHUB_OUTPUT
        echo "rel_date=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "tag_date=$(date +"%m%d-%H%M%S")" >> $GITHUB_ENV

        echo "=============================================="
        echo "Current Release Date: $(date +"%Y-%m-%d %H:%M:%S")"
        echo "Current Tag Date:     $(date +"%m%d-%H%M%S")"
        echo "=============================================="

    - name: Compile the firmware
      id: compile
      run: |
        set -euo pipefail
        cd openwrt
        df -hT
        echo "::group::Print build info..."
        echo -e "$(($(nproc)+1)) thread compile"
        make -j$(($(nproc)+1)) || make -j1 V=s
        echo "::endgroup::"
        df -hT

        echo "=============================================="
        echo "Current Release Date: $(date +"%Y-%m-%d %H:%M:%S")"
        echo "Current Tag Date:     $(date +"%m%d-%H%M%S")"
        echo "=============================================="

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Prepare artifact
      run: |
        set -euo pipefail
        FIRMWARE_DIR="openwrt/bin/firmware"
        PACKAGE_DIR="openwrt/bin/package"
        TARGETS_DIR="openwrt/bin/targets"
        PACKAGES_DIR="openwrt/bin/packages"
        mkdir -p "$FIRMWARE_DIR" "$PACKAGE_DIR" "$PACKAGES_DIR"
        find "$TARGETS_DIR" -type f \( -name "packages" -o -name "*.buildinfo" -o -name "sha256sums" -o -name "*.manifest" \) -delete
        KVER=$(find openwrt/target/linux/generic -maxdepth 1 -name 'kernel-*' | sort -V | tail -n1)
        KVER=$(grep 'LINUX_VERSION' "$KVER" | awk -F '[-= ]+' '{print $2$3}' | tr -d ' ')
        find "$TARGETS_DIR" -type f -name "*squashfs-*efi.img*" \
            -exec mv -f {} "${FIRMWARE_DIR}/openwrt-${{ matrix.name }}-${KVER}-x86-64-generic-squashfs-combined-efi.img.gz" \;
        find "$TARGETS_DIR" -type f -name "*ext4-*efi.img*" \
            -exec mv -f {} "${FIRMWARE_DIR}/openwrt-${{ matrix.name }}-${KVER}-x86-64-generic-ext4-combined-efi.img.gz" \;
        echo "::group::Print apk info..."
        find "$PACKAGES_DIR" -type f -name "*.apk" -exec mv -t "$PACKAGE_DIR" {} +
        echo "::endgroup::"
        (cd "$PACKAGE_DIR" && tar -zcvf ${{ matrix.name }}-IPK.tar.gz * && rm -rf *.apk)


    - name: Deliver package
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.name }}-IPK
        path: ./openwrt/bin/package/
        retention-days: 1

    - name: Deliver firmware
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.name }}-firmware
        path: ./openwrt/bin/firmware/
        retention-days: 1

  upload-release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./downfiles
        merge-multiple: true

    - name: Organize Release Files
      run: |
        set -euo pipefail
        mkdir -p ./combined-firmware

        echo "=============== downfiles ==============="
        pwd
        find ./downfiles -print -type f -printf '%f\n'
        echo "=============== end ====================="

        find ./downfiles -type f \
            \( -name "*efi*" -o -name "*.gz" \) \
            -exec mv -t ./combined-firmware {} +

        echo "=============== combined ==============="
        find ./combined-firmware -type f -printf '%f\n'
        echo "=============== end ===================="

    - name: Upload Firmware to Release
      uses: ncipollo/release-action@v1
      with:
        name: x86_64 ${{ needs.build.outputs.rel_date }}
        tag: ${{ needs.build.outputs.tag_date }}
        artifacts: ./combined-firmware/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## Firmware for personal use, plug-ins can be deleted according to personal needs.
          - **Devices:** x86_64
          - **Branches:** main, openwrt-25.12
          - **Default IP:** `192.168.11.13`
          - **Username:** `root`
